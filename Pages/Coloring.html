<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Association Game</title>
    <style>
	* {
    font-family: Helvetica;
}


body {
    background-image: url("wallpaperflare.com_wallpaper.jpg");
    height: 500px;
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;
    background-color: #cccccc;
    opacity: 0.9;
}


#one.square {
    height: 100px;
    width: 100%;
    padding: 0%;
    border: 3px solid rgb(9, 123, 9);
    background-color: yellow;
    margin-left: -4px;
    margin-top: -10px;
    margin-bottom: 0px;
    display: flex;
    align-items: center;
    justify-content: center;
}


#one.square h1 {
    font-size: 48px;
    color: blueviolet;
    text-shadow: 0.5px 0.5px black;
}


.regquestion {
    text-align: center;
    font-size: 36px;
    color: white;
    margin-top: 6px;
    margin-bottom: 6px;
}


#questionnaire.square {
    height: 100px;
    width: 270px;
    padding: 0%;
    border: 3px solid rgb(9, 123, 9);
    background-color: rgb(0, 229, 255);
    border-radius: 15px;
    margin-top: -10px;
    margin-bottom: 0px;
    display: flex;
    margin-left: auto;
    margin-right: auto;
    align-items: center;
    justify-content: center;
}


#questionnaire.square p, #letterA.square p, #letterB.square p, #letterC.square p, #letterD.square p{
    font-size: 36px;
    color: black;
    text-shadow: 0.5px 0.5px yellowgreen;
}


.firsttwodoubles, .seconddoubles {
    display: flex;
    justify-content: center;
}


#letterA.square {
    height: 100px;
    width: 270px;
    border-radius: 15px;
    padding: 0%;
    border: 3px solid rgb(9, 123, 9);
    background-color: rgb(255, 145, 0);
    margin-top: 32px;
    margin-bottom: 0px;
    margin-right: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
}


#letterB.square {
    height: 100px;
    width: 270px;
    padding: 0%;
    border-radius: 15px;
    border: 3px solid rgb(9, 123, 9);
    background-color: rgb(247, 0, 255);
    margin-top: 32px;
    margin-bottom: 0px;
    display: flex;
    align-items: center;
    justify-content: center;
}


#letterC.square {
    height: 100px;
    width: 270px;
    padding: 0%;
    border-radius: 15px;
    border: 3px solid rgb(9, 123, 9);
    background-color: rgb(229, 255, 0);
    margin-top: 32px;
    margin-bottom: 0px;
    margin-right: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
}


#letterD.square {
    height: 100px;
    width: 270px;
    padding: 0%;
    border-radius: 15px;
    border: 3px solid rgb(9, 123, 9);
    background-color: rgb(0, 255, 51);
    margin-top: 32px;
    margin-bottom: 0px;
    margin-right: 0px;
    display: flex;
    align-items: center;
    justify-content: center;
}


#returnButton.square {
    height: 30px;
    width: 100px;
    padding: 0%;
    border: 3px solid rgb(9, 123, 9);
    background-color: white;
    border-radius: 10px;
    margin-left: 10px;
    margin-right: auto;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
}


#returnButton.square button {
    font-size: 18px;
    color: palevioletred;
    background-color: white;
    border: none;
    cursor: pointer;
}


#correctCounterBox.square {
    height: 20px;
    width: 100px;
    padding: 0%;
    border: 1.5px solid rgb(9, 123, 9);
    background-color: greenyellow;
    margin-top: 0px;
    margin-bottom: 0px;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    align-items: center;
    justify-content: center;
}
</style>
</head>
<body>
    <div class="square" id="one">
        <h1>WORD ASSOCIATION GAME</h1>
    </div>


    <div class="square" id="returnButton">
        <button onclick="goBack()">Return</button>
    </div>
   
    <div class="square" id="correctCounterBox">
        <div id="correctCounter" style="text-align: center; font-size: 18px; color: green;">
            Correct: 0
        </div>
    </div>


    <p class="regquestion"><strong>Find the odd one out - with:</strong></p>


    <div class="square" id="questionnaire" style="opacity: 0;">
        <p>Cat</p>
    </div>


    <div class="firsttwodoubles">
        <div class="square" id="letterA" style="opacity: 0;" onclick="checkAnswer('letterA')"><p>Dog</p></div>
        <div class="square" id="letterB" style="opacity: 0;" onclick="checkAnswer('letterB')"><p>Parrot</p></div>
    </div>


    <div class="seconddoubles">
        <div class="square" id="letterC" style="opacity: 0;" onclick="checkAnswer('letterC')"><p>Mouse</p></div>
        <div class="square" id="letterD" style="opacity: 0;" onclick="checkAnswer('letterD')"><p>Cart</p></div>
    </div>


    <div id="correctMessage" style="display: none; text-align: center; font-size: 24px; color: green; margin-top: 20px;">
        Correct!
    </div>


    <div id="incorrectMessage" style="display: none; text-align: center; font-size: 24px; color: red; margin-top: 20px;">
        Incorrect!
    </div>


    <script>
        var correctCounter = 0;


        function fadeInElement(element) {
            var opacity = 0;
            var intervalId = setInterval(function () {
                if (opacity >= 1) {
                    clearInterval(intervalId);
                } else {
                    opacity += 0.1;
                    element.style.opacity = opacity;
                }
            }, 100);
        }


        function fadeIn(element) {
            var opacity = 0;
            var intervalId = setInterval(function () {
                if (opacity >= 1) {
                    clearInterval(intervalId);
                } else {
                    opacity += 0.1;
                    element.style.opacity = opacity;
                }
            }, 100);
        }


        function startFadingSequence() {
            fadeInElement(document.getElementById('questionnaire'));


            setTimeout(function () {
                var answerElements = document.querySelectorAll('.square[id^="letter"]');
                answerElements.forEach(function (answer) {
                    fadeIn(answer);
                });
            }, 1000);
        }


        window.onload = startFadingSequence;


        function goBack() {
            alert("Returning to main screen.");
        }


        function checkAnswer(selectedId) {
            var correctAnswerId = 'letterD';


            var answerElements = document.querySelectorAll('.square[id^="letter"]');
            answerElements.forEach(function (answer) {
                answer.onclick = null;
            });


            if (selectedId === correctAnswerId) {
                document.getElementById(selectedId).style.backgroundColor = 'green';


                document.getElementById('correctMessage').style.display = 'block';


                correctCounter++;
            } else {
                document.getElementById(selectedId).style.backgroundColor = 'red';


                document.getElementById('incorrectMessage').style.display = 'block';
            }


            document.getElementById('correctCounter').innerText = 'Correct: ' + correctCounter;
        }
    </script>
</body>
</html>
